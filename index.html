<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h1 class="sidebar-title">Series</h1>

      <input 
        type="text" 
        id="search" 
        class="search-input" 
        placeholder="Search series..."
      >

      <!-- 🔥 VACÍO: se llena con JS -->
      <ul id="series-list" class="series-list"></ul>

      <button id="export" class="export-btn">Export CSV</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <h1 class="main-title">Details</h1>

      <form id="series-form" class="details-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter series name" required>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="Enter description">
        </div>

        <div class="form-group">
          <label for="image">Image URL</label>
          <input type="url" id="image" placeholder="Enter image URL">
        </div>

        <button type="submit" class="save-btn">Save</button>
      </form>

      <!-- 🔒 empieza desactivado -->
      <button id="delete" class="delete-btn" disabled>Delete</button>
    </main>

  </div>

  <!-- 🔥 CONEXIÓN AL CEREBRO -->
  <script src="app.js"></script>
</body>
</html>
