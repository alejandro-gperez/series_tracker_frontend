<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <aside class="sidebar">
      <h1 class="sidebar-title">Series</h1>

      <input type="text" id="search" class="search-input" placeholder="Search series...">

      <ul id="series-list" class="series-list"></ul>

      <p id="empty-state" class="empty-state hidden">No series found</p>

      <button id="export" class="export-btn">Export CSV</button>
    </aside>

    <main class="main-content">
      <h1 class="main-title">Details</h1>

      <!-- VIEW MODE -->
      <div id="details-view" class="details-view hidden">
        <h2 id="view-name"></h2>
        <p id="view-description"></p>
        <img id="view-image">

        <button id="edit-btn" class="save-btn">Edit</button>
      </div>

      <!-- FORM MODE -->
      <form id="series-form" class="details-form hidden">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <input type="text" id="description">
        </div>

        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="image">
        </div>

        <!-- preview -->
        <img id="preview-image" class="hidden">

        <button type="submit" class="save-btn">Save</button>
      </form>

      <button id="new-btn" class="export-btn">New Series</button>
      <button id="delete" class="delete-btn" disabled>Delete</button>
    </main>

  </div>

  <div id="toast" class="toast hidden"></div>

  <footer class="footer">
    <p>© 2026 Alejandro Pérez</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
